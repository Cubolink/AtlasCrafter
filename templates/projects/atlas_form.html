{% extends "base.html" %}

{% block title %}{{ title }} - BlueMap Web UI Panel{% endblock %}

{% block content %}
  <div class="row">
    <h1>{{ title }}</h1>
    <a href="{{ atlas.project.get_absolute_url }}">Back to Project</a>
  </div>

  <section class="panel">
    <p class="muted">{{ atlas.project.name }} / {{ atlas.world_folder.source_path }}</p>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">{{ submit_label }}</button>
    </form>
  </section>
{% endblock %}
