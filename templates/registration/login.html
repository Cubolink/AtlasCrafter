{% extends "base.html" %}
{% load icons %}

{% block title %}Log in - AtlasCrafter{% endblock %}

{% block breadcrumbs %}
  <li>{% icon "log-in" %} Log in</li>
{% endblock %}

{% block content %}
  <section class="panel mx-auto max-w-md">
    <h1>{% icon "log-in" "icon-heading" %}Log in</h1>
    <form method="post">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit">{% icon "log-in" %} Log in</button>
    </form>
  </section>
{% endblock %}
